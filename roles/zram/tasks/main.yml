---
- name: Ensure zram kernel module is available (Ubuntu)
  apt:
    name: "linux-modules-extra-{{ ansible_kernel }}"
    state: present
    update_cache: true
  when: ansible_distribution == "Ubuntu"

- name: Install zram-tools
  apt:
    name: zram-tools
    state: present

- name: Configure zram swap
  copy:
    dest: /etc/default/zramswap
    content: |
      # Compression algorithm (zstd = best ratio, lz4 = fastest)
      ALGO={{ zram_algorithm }}
      # Percentage of RAM to use as zram swap
      PERCENT={{ zram_percent }}
    owner: root
    group: root
    mode: "0644"
  notify: restart zramswap

- name: Enable and start zramswap
  systemd:
    name: zramswap
    enabled: true
    state: started

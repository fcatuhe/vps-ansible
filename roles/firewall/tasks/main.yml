---
- name: Configure ufw defaults
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - direction: incoming
      policy: deny
    - direction: outgoing
      policy: allow

- name: Rate-limit SSH
  community.general.ufw:
    rule: limit
    port: '22'
    proto: tcp

- name: Allow HTTP and HTTPS
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - '80'
    - '443'
  when: firewall_allow_web

- name: Enable ufw
  community.general.ufw:
    state: enabled
